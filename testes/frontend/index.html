<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Clínica</title>

    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background: #ecf0f1;
        margin: 0;
        padding: 40px 20px;
      }

      h1 {
        text-align: center;
        color: #2c3e50;
      }

      .container {
        display: flex;
        justify-content: center;
        gap: 25px;
        flex-wrap: wrap;
        margin-top: 40px;
      }

      .card {
        background: white;
        width: 300px;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 5px 12px #0002;
      }

      .card h2 {
        color: #2c3e50;
        margin-top: 0;
      }

      label {
        display: block;
        margin-top: 12px;
        margin-bottom: 5px;
        font-weight: bold;
      }

      input {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      button {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover {
        background: #2980b9;
      }

      .busca {
        border-top: 5px solid #e74c3c;
      }

      .busca button {
        background: #e74c3c;
      }

      .busca button:hover {
        background: #c0392b;
      }
    </style>
  </head>

  <body>
    <h1>Sistema da Clínica</h1>

    <div class="container">
      <div class="card">
        <h2>Cadastrar paciente</h2>

        <form action="/cadastrar" method="POST">
          <label>Nome:</label>
          <input
            type="text"
            name="name"
            placeholder="Nome do paciente"
            required
          />

          <label>CPF:</label>
          <input type="text" name="cpf" placeholder="CPF" required />

          <label>Diagnóstico:</label>
          <input
            type="text"
            name="diagnosis"
            placeholder="Diagnóstico"
            required
          />

          <button type="submit">Cadastrar</button>
        </form>
      </div>

      <div class="card">
        <h2>Cadastrar médico</h2>

        <form action="/cadastrar_medico" method="POST">
          <label>Nome:</label>
          <input
            type="text"
            name="name"
            placeholder="Nome do médico"
            required
          />

          <label>CRM:</label>
          <input type="text" name="crm" placeholder="CRM" required />

          <label>Especialidade:</label>
          <input
            type="text"
            name="specialty"
            placeholder="Especialidade"
            required
          />

          <button type="submit">Cadastrar</button>
        </form>
      </div>

      <div class="card busca">
        <h2>Buscar paciente</h2>

        <form action="/buscar" method="GET">
          <label>Token:</label>

          <input
            type="text"
            name="cpf"
            placeholder="Digite o CPF para buscar"
          />

          <button type="submit">Buscar</button>
        </form>
      </div>
    </div>
  </body>
</html>
